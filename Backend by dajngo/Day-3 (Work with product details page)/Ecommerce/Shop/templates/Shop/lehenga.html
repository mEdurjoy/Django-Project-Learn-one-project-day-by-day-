{% extends 'Shop/base.html' %}
{% load static %}
{% block title %}Buy Now{% endblock title %}
{% block main-content %}
<div class="container my-5">
    <div class="row">
        <div class="col-sm-3">
            <div class="list-group"> 
                <a href="{% url 'lehenga' %}" class="list-group-item list-group-item-action">All Lehengas</a>
                <a href="{% url 'lehenga-data' 'Lubnan' %}" class="list-group-item list-group-item-action">Lubnan</a>
                <a href="{% url 'lehenga-data' 'Aarong' %}" class="list-group-item list-group-item-action">Aarong</a>
            </div>
        </div>




        <div class="col-sm-8 offset-sm-1">
            <div class='row'>
               {% for p in lehengas%}
               <div class='col-sm-4 text-center mb-4'>
                  <a href="{% url 'product-detail' p.id %}" class='btm'>
                      <div class='item'>
                        <img src="{{p.product_image.url}}" alt="" height='300'>
                        <div class='fw-bold'>
                            {{ p.title }}
                        </div>
                        <div class='fw-bold'>
                            TK {{p.discounted_price}}
                            <small class='fw-light text-decoration-linethrough'>
                                {{p.selling_price}}
                            </small>
                        </div>

                      </div>
                  </a>
               </div>
               {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
